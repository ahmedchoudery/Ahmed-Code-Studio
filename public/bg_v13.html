<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <!-- Google Fonts — Premium Editorial Stack -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet">
  <!--
    Theme color matches JPEG corner pixels exactly: rgb(0,0,0).
    This ensures the browser chrome/address bar blends with the page.
  -->
  <meta name="theme-color" content="#000000">
  <title>Muhammad Ahmed Raza</title>

  <!--
  ╔══════════════════════════════════════════════════════════════════════╗
  ║  STUDIO DARK  ·  bg v13.0  — Zero-Canvas Mobile  [FIXED]           ║
  ║                                                                      ║
  ║  ROOT CAUSE OF ALL PREVIOUS MOBILE PROBLEMS:                        ║
  ║  1. Canvas drawImage() runs on main thread → touch lag              ║
  ║  2. INK color #0A0804 ≠ JPEG edge color #000000 → visible seam     ║
  ║  3. Canvas grain + particles on mobile → wasted CPU                 ║
  ║  4. Portrait div had transparent background → lighter gap visible   ║
  ║                                                                      ║
  ║  v10 MOBILE ARCHITECTURE (< 1100px):                                ║
  ║  ─────────────────────────────────────────────────────────────────  ║
  ║  · Canvas: completely disabled (display:none, no RAF started)       ║
  ║  · Portrait: CSS <img>, bottom-anchored, rises from below           ║
  ║  · Base color: #000000 — pixel-matched to JPEG corner pixels        ║
  ║  · All motion: CSS compositor thread (zero JS after reveal)         ║
  ║  · Touch: no event handlers on background — zero lag possible       ║
  ║  · After entrance animation: completely static background           ║
  ║                                                                      ║
  ║  v10 DESKTOP ARCHITECTURE (≥ 1100px):                               ║
  ║  ─────────────────────────────────────────────────────────────────  ║
  ║  · Canvas draws everything (unchanged — looks great)                ║
  ║  · INK updated to [0,0,0] to match new image corners (pure black)                    ║
  ║  · CSS portrait hidden                                               ║
  ║                                                                      ║
  ║  MOBILE PORTRAIT ENTRANCE SEQUENCE:                                  ║
  ║  0ms    Page loads, dark screen (#000000), preloader visible        ║
  ║  ~300ms JPEG decoded (browser async), preloader fades               ║
  ║  500ms  Portrait transition armed (.ready class)                    ║
  ║  600ms  Portrait rises: translateY(6%)→0, opacity 0→1 (1.5s)       ║
  ║  2100ms Portrait fully settled — zero ongoing work                  ║
  ║                                                                      ║
  ║  COLOR MATCH STRATEGY:                                               ║
  ║  · body background: #000000                                         ║
  ║  · portrait container background: #000000 (no transparent gaps)     ║
  ║  · gradient start: rgb(0,0,0) — exact match                        ║
  ║  · gradient uses long hold (0%–20% solid dark) before transitioning ║
  ║    This gives 12px of margin for JPEG compression color drift.      ║
  ║                                                                      ║
  ║  USAGE                                                               ║
  ║  · Place alongside design1_desktop.jpg, design1_tablet.jpg, design1_mobile.jpg        ║
  ║  · Typography: add to <main id="mc"> with pointer-events:all       ║
  ╚══════════════════════════════════════════════════════════════════════╝
  -->

  <noscript>
    <style>
      html,body { margin:0; padding:0; width:100%; height:100svh; overflow:hidden; background:#000000 }
      .fb { position:fixed; inset:0; background:url('design1.desktop.webp') 50% 50%/cover no-repeat;
            filter:brightness(.22) saturate(.40) sepia(.30) }
    </style>
    <div class="fb" role="img" aria-hidden="true"></div>
  </noscript>

  <style>
    /* ═══════════════════════════════════════════════════════════════
       DESIGN TOKENS
    ═══════════════════════════════════════════════════════════════ */
    :root {
      /*
       * BASE COLOR — sampled from JPEG corner pixels.
       * rgb(0,0,0): warm near-black that matches the photo's natural
       * dark vignette edges. Using any other value creates a visible
       * seam between the CSS background and the photograph.
       */
      --base     : #000000;
      --base-r   : 0;
      --base-g   : 0;
      --base-b   : 0;

      /* Accent */
      --amber    : #C09218;
      --amber-rgb: 192, 146, 24;

      /* Portrait entrance — cinematic rise from below */
      --rise-ease    : cubic-bezier(0.12, 1, 0.28, 1);   /* custom expo-out: fast start, long breathe */
      --rise-duration: 1.8s;                              /* longer = more cinematic */
      --rise-delay   : 0.05s;                             /* near-immediate after .ready */
    }

    /* ═══════════════════════════════════════════════════════════════
       BASE RESET
    ═══════════════════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }

    html {
      height: 100%;
      height: 100svh;   /* small viewport — avoids iOS address-bar jump */
    }

    body {
      width: 100%;
      height: 100svh;
      overflow: hidden;
      background: var(--base);
      overscroll-behavior: none;
      -webkit-overflow-scrolling: touch;
    }

    /* ═══════════════════════════════════════════════════════════════
       SKIP LINK (accessibility)
    ═══════════════════════════════════════════════════════════════ */
    .skip {
      position: fixed; top: -120%; left: 16px; z-index: 700;
      padding: 8px 14px;
      background: rgba(var(--amber-rgb), .92); color: var(--base);
      font-family: 'Courier New', monospace; font-size: 12px;
      text-decoration: none; border-radius: 2px;
      transition: top 120ms ease;
    }
    .skip:focus { top: 16px }

    /* ═══════════════════════════════════════════════════════════════
       PRELOADER
    ═══════════════════════════════════════════════════════════════ */
    #loader {
      position: fixed; inset: 0; z-index: 600;
      background: var(--base);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
      transition: opacity 1s var(--rise-ease), visibility 1s;
      will-change: opacity;
    }
    #loader.out {
      opacity: 0; visibility: hidden; pointer-events: none;
    }

    /* Three rising film-lines */
    .ld-lines { display: flex; gap: 5px; align-items: flex-end; height: 38px }
    .ld-line {
      width: 1px;
      background: linear-gradient(to top, transparent, rgba(var(--amber-rgb),.22), transparent);
      animation: ldRise 2.1s ease-in-out infinite;
      transform-origin: bottom center;
    }
    .ld-line:nth-child(1) { height: 38px; animation-delay: 0s }
    .ld-line:nth-child(2) { height: 26px; animation-delay: .21s }
    .ld-line:nth-child(3) { height: 16px; animation-delay: .42s }

    @keyframes ldRise {
      0%,100% { transform: scaleY(.22); opacity: .22 }
      50%     { transform: scaleY(1);   opacity: .78 }
    }

    .ld-text {
      font-family: 'Courier New', Courier, monospace;
      font-size: 7px; letter-spacing: 7px;
      color: rgba(var(--amber-rgb),.16); text-transform: lowercase;
    }

    /* ═══════════════════════════════════════════════════════════════
       CSS AMBIENT GLOW — GPU compositor thread, zero JS cost
       Two independently breathing warm/cool pools.
       Runs on both desktop and mobile.
    ═══════════════════════════════════════════════════════════════ */
    .amb {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
      will-change: opacity;
      contain: strict;
    }

    /* Warm lamp glow — top-centre, matching lamp position in all three images */
    .amb-warm {
      background: radial-gradient(
        ellipse 60% 45% at 50% 18%,
        rgba(var(--amber-rgb), .095)  0%,
        rgba(160, 100, 18, .038)      42%,
        transparent                   100%
      );
      animation: ambPulse 23.7s ease-in-out infinite;
    }

    /* Cool shadow undertow — lower left, cinematic depth counterpoint */
    .amb-cool {
      background: radial-gradient(
        ellipse 50% 44% at 10% 80%,
        rgba(12, 8, 22, .065)  0%,
        transparent            100%
      );
      animation: ambPulse 18.1s ease-in-out infinite 5.3s;
    }

    @keyframes ambPulse {
      0%,100% { opacity: .68 }
      42%     { opacity: 1.00 }
      74%     { opacity: .80 }
    }

    /* ═══════════════════════════════════════════════════════════════
       CANVAS — DESKTOP ONLY
       On mobile (< 1100px): display:none eliminates the element from
       the render tree entirely. No GPU layer created, no memory used.
    ═══════════════════════════════════════════════════════════════ */
    #cv {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      display: block;
      pointer-events: none; z-index: 1;
      contain: strict;
      will-change: contents;
    }

    /* ═══════════════════════════════════════════════════════════════
       MOBILE PORTRAIT — CSS img, rises from below
       ─────────────────────────────────────────────────────────────
       Architecture:
       · Fixed, bottom-anchored — sits in the lower portion of screen
       · background: var(--base) — no transparent gap between body and container
       · ::before — gradient masks (top fade, side fades, bottom fade)
       · ::after — cinematic colour grade overlay
       · img — object-fit:cover with object-position tuned per breakpoint

       Entrance:
       · Initial: opacity:0, translateY(6%) — hidden below frame
       · .ready: enables the CSS transition (added before .in)
       · .in: opacity:1, translateY(0) — portrait rises into view
       · After settle: completely static, zero ongoing work
    ═══════════════════════════════════════════════════════════════ */
    #m-portrait {
      /*
       * Hidden on desktop — CSS `display:none` removes it from
       * render tree completely.
       */
      display: none;

      position: fixed;
      bottom: 0; left: 0; right: 0;

      /*
       * Height set by breakpoint media queries below.
       * The portrait zone occupies the lower portion of the screen.
       * The upper portion (content zone) is purely dark background.
       */
      height: 72svh;   /* taller — shows more of portrait, less empty dark space above */

      z-index: 2;
      background: var(--base);

      /*
       * Entrance state: invisible, shifted down 8% and slightly scaled up.
       * The scale(1.06) gives depth — portrait feels like it emerges from
       * behind the screen, not just slides up from below.
       */
      opacity: 0;
      transform: translateY(8%) scale(1.06);
    }

    /*
     * .ready — enables the CSS transition.
     * Added programmatically via JS after image load.
     * Must be applied at least one frame before .in.
     */
    #m-portrait.ready {
      transition:
        opacity   var(--rise-duration) var(--rise-ease) var(--rise-delay),
        transform var(--rise-duration) var(--rise-ease) var(--rise-delay);
      will-change: opacity, transform;
    }

    /*
     * .in — triggers the entrance animation.
     * Added one RAF after .ready to ensure transition is armed.
     */
    #m-portrait.in {
      opacity: 1;
      transform: translateY(0) scale(1);   /* settles to natural size */
    }

    #m-img {
      display: block;
      width: 112%; height: 112%;   /* 12% overflow — more room for tilt without clipping */
      margin: -6%;                  /* center the overflow */
      object-fit: cover;
      object-position: 50% 12%;     /* slightly higher to keep face clear */
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
      will-change: transform;       /* GPU compositor track — zero layout cost */
      transform: translate(0px, 0px);  /* default — overridden by JS */
    }

    /* ═══════════════════════════════════════════════════════════════
       PREMIUM EDITORIAL TYPOGRAPHY SYSTEM
       ─────────────────────────────────────────────────────────────
       · Display: Cormorant Garamond — cinematic serif for headings
       · Body: Inter — clean, legible, modern
       · Mono: Space Mono — technical accents and labels
       Accessible contrast maintained throughout.
    ═══════════════════════════════════════════════════════════════ */

    /* Base typography resets */
    #mc {
      font-family: 'Inter', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-feature-settings: 'kern' 1, 'liga' 1, 'calt' 1;
      color: rgba(255,255,255,0.88);
    }

    /* ── Overline / Label ── */
    .ty-label {
      font-family: 'Space Mono', monospace;
      font-size: clamp(8px, 1.1vw, 11px);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(192,146,24,0.72);
      font-weight: 400;
    }

    /* ── Hero Display — Editorial headline ── */
    .ty-display {
      font-family: 'Cormorant Garamond', 'Palatino Linotype', serif;
      font-size: clamp(52px, 9.5vw, 128px);
      font-weight: 300;
      line-height: 0.92;
      letter-spacing: -0.02em;
      color: rgba(255,255,255,0.96);
      font-style: italic;
    }
    .ty-display strong {
      font-style: normal;
      font-weight: 600;
      color: #fff;
    }

    /* ── Subtitle / Chapter head ── */
    .ty-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(20px, 3vw, 38px);
      font-weight: 300;
      line-height: 1.24;
      letter-spacing: 0.01em;
      color: rgba(255,255,255,0.72);
    }

    /* ── Body copy ── */
    .ty-body {
      font-family: 'Inter', sans-serif;
      font-size: clamp(13px, 1.5vw, 16px);
      font-weight: 300;
      line-height: 1.78;
      letter-spacing: 0.02em;
      color: rgba(255,255,255,0.58);
    }

    /* ── Eyebrow — thin divider line + word ── */
    .ty-eyebrow {
      display: flex;
      align-items: center;
      gap: 14px;
      font-family: 'Space Mono', monospace;
      font-size: 8px;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: rgba(192,146,24,0.55);
    }
    .ty-eyebrow::before {
      content: '';
      display: block;
      width: 32px;
      height: 1px;
      background: rgba(192,146,24,0.38);
      flex-shrink: 0;
    }

    /* ── Amber accent text ── */
    .ty-amber {
      color: rgba(192,146,24,0.92);
    }

    /* ── Ghost button ── */
    .ty-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.72);
      border: 1px solid rgba(255,255,255,0.18);
      padding: 14px 24px;
      text-decoration: none;
      transition: border-color 0.4s ease, color 0.4s ease, background 0.4s ease;
      pointer-events: all;
      cursor: pointer;
      background: rgba(0,0,0,0.12);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .ty-btn:hover {
      border-color: rgba(192,146,24,0.55);
      color: rgba(192,146,24,0.92);
      background: rgba(192,146,24,0.06);
    }
    .ty-btn::after {
      content: '→';
      font-size: 11px;
    }

    /* ── Number / counter accent ── */
    .ty-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(80px, 18vw, 220px);
      font-weight: 300;
      line-height: 1;
      color: rgba(255,255,255,0.035);
      letter-spacing: -0.04em;
      pointer-events: none;
      user-select: none;
    }

    /* ── Divider ── */
    .ty-rule {
      border: none;
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin: 0;
    }

    /*
     * GRADIENT MASK OVERLAY — ::before
     * Creates seamless dissolve from body background into portrait.
     *
     * CRITICAL VALUES:
     * rgb(0,0,0) = same as --base = same as body background = JPEG corners
     * The gradient starts solid and holds for 20% before fading.
     * This 20% "hold zone" provides 12+ pixels of margin for JPEG
     * compression artifacts at the portrait edges. Any slight color
     * difference between the gradient and the photo is invisible
     * because the gradient is 100% opaque in that zone.
     *
     * Multiple gradient layers:
     * - Top: portrait fades up into content zone (most important)
     * - Left/Right: portrait melts into screen edges
     * - Bottom: portrait base fades out (removes hard bottom edge)
     */
    #m-portrait::before {
      content: '';
      position: absolute; inset: 0; z-index: 1;
      pointer-events: none;
      background:
        /*
         * TOP FADE — portrait emerges from darkness into scene.
         *
         * Design intent: the dark content zone (top 28% of screen)
         * must be fully opaque. Below that the portrait should show
         * clearly with no gradient interference on the face.
         *
         * Hold: 0–14% = solid black (content zone safety margin)
         * Transition: 14–38% = gradient falls away quickly
         * Clear: 38%+ = portrait shows at full visibility
         *
         * The face in all three images starts below 38% of the
         * container height, so it is never obscured by this gradient.
         */
        linear-gradient(
          to bottom,
          rgb(0,0,0)       0%,
          rgb(0,0,0)       10%,   /* tighter hold for more visibility */
          rgba(0,0,0,.75)  16%,
          rgba(0,0,0,.45)  24%,
          rgba(0,0,0,.15)  32%,
          rgba(0,0,0,0)    40%
        ),
        /* LEFT EDGE MELT — thinner, porthole ring handles its own dark edge */
        linear-gradient(
          to right,
          rgba(0,0,0,.50)  0%,
          rgba(0,0,0,.18)  16%,
          rgba(0,0,0,0)    30%
        ),
        /* RIGHT EDGE MELT */
        linear-gradient(
          to left,
          rgba(0,0,0,.50)  0%,
          rgba(0,0,0,.18)  16%,
          rgba(0,0,0,0)    30%
        ),
        /* BOTTOM ANCHOR */
        linear-gradient(
          to top,
          rgba(0,0,0,.85)  0%,
          rgba(0,0,0,.40)  12%,
          rgba(0,0,0,.08)  24%,
          rgba(0,0,0,0)    34%
        );
    }

    /*
     * CINEMATIC COLOUR GRADE — ::after
     * Applies warm amber toning at the lamp position (top of subject)
     * and subtle cool shadow vignette at the edges.
     * This matches the JPEG's existing color story.
     */
    #m-portrait::after {
      content: '';
      position: absolute; inset: 0; z-index: 2;
      pointer-events: none;
      background:
        /* Amber lamp warmth — lamp is top-centre in all three new images */
        radial-gradient(
          ellipse 68% 36% at 50% 6%,
          rgba(192, 120, 18, .090) 0%,
          rgba(192, 100, 16, .035) 50%,
          transparent              100%
        ),
        /* Cool shadow vignette at edges and lower corners */
        radial-gradient(
          ellipse 94% 84% at 50% 52%,
          transparent        38%,
          rgba(0,0,0,.10)   70%,
          rgba(0,0,0,.32)  100%
        );
    }

    /* ═══════════════════════════════════════════════════════════════
       CSS VIGNETTE — static, compositor-cached, both desktop+mobile
       Using CSS gradients means this renders ONCE and is cached.
       No canvas cost whatsoever.
    ═══════════════════════════════════════════════════════════════ */
    #vig {
      position: fixed; inset: 0; z-index: 4;
      pointer-events: none; contain: strict;
      background:
        /*
         * LEFT edge — this is the content boundary on desktop.
         * Strong hold so text is always readable over porthole ring.
         * The canvas content-zone gradient handles most of the work,
         * this adds the finishing layer.
         */
        linear-gradient(to right,
          rgba(0,0,0,.72)  0%,
          rgba(0,0,0,.30)  14%,
          rgba(0,0,0,.05)  28%,
          transparent      40%
        ),
        /* Right edge — porthole image has dark right corners naturally */
        linear-gradient(to left,
          rgba(0,0,0,.72)  0%,
          rgba(0,0,0,.28)  12%,
          transparent      28%
        ),
        /* Top — softened to remove 'black line' artifact */
        linear-gradient(to bottom,
          rgba(0,0,0,0.85)  0%,
          rgba(0,0,0,0.40)  15%,
          rgba(0,0,0,0.10)  28%,
          transparent       42%
        ),
        /* Bottom anchor — deepest zone, grounds composition */
        linear-gradient(to top,
          rgba(0,0,0,.97)  0%,
          rgba(0,0,0,.55)  14%,
          rgba(0,0,0,.12)  28%,
          transparent      40%
        ),
        /*
         * Main radial — softened edges to prevent banding
         */
        radial-gradient(
          ellipse 100% 90% at 50% 50%,
          transparent        0%,
          rgba(0,0,0,.02)   40%,
          rgba(0,0,0,.25)   70%,
          rgba(0,0,0,.92)  100%
        );
    }

    /* ═══════════════════════════════════════════════════════════════
       CONTENT SLOT
    ═══════════════════════════════════════════════════════════════ */
    #mc {
      position: fixed; inset: 0; z-index: 10;
      pointer-events: none;
    }

    /* ═══════════════════════════════════════════════════════════════
       RESPONSIVE BREAKPOINTS — MOBILE / TABLET
    ═══════════════════════════════════════════════════════════════ */

    /* ── Show mobile portrait, hide canvas on touch viewports ── */
    @media (max-width: 1099px) {
      #cv         { display: none }    /* canvas off — no GPU layer created */
      #m-portrait { display: block }
    }

    /* ── Mobile portrait — small phones (≤ 600px width) ── */
    @media (max-width: 600px) and (orientation: portrait) {
      #m-portrait {
        /*
         * 75svh: Increased height for better framing of the tall mobile portrait.
         */
        height: 75svh;
      }
      #m-img {
        /*
         * 50% 6%: Pulled higher to ensure face is visible in the bottom 50%
         * of the viewport even with browser address bars.
         */
        object-position: 50% 6%;
      }
    }

    /* ── Mobile landscape — phone on its side ── */
    @media (max-width: 900px) and (orientation: landscape) {
      #m-portrait {
        /*
         * Landscape mobile: full height, pushed to right 35%.
         * Left 35% is content zone (name, bio, CTA).
         * Portrait fills right 65% of screen.
         */
        height: 100svh;
        left: 35%;
        right: 0;
      }
      #m-img {
        /* 
         * design1_tablet.jpg (3:4) in landscape:
         * Face at ~24% from top of image, anchor at 18%.
         * Tighter anchor ensures face shows in narrow height.
         */
        object-position: 50% 18%;
      }
      #m-portrait::before {
        /*
         * In landscape: left edge is the content boundary.
         * Left gradient must be very strong (content sits flush against it).
         * Top/bottom fades are standard.
         */
        background:
          /* Left dissolve — strong, content zone edge */
          linear-gradient(
            to right,
            rgb(0,0,0)        0%,
            rgb(0,0,0)        18%,
            rgba(0,0,0,.82)   26%,
            rgba(0,0,0,.45)   38%,
            rgba(0,0,0,.10)   52%,
            rgba(0,0,0,0)     64%
          ),
          /* Right edge — lighter (already dark from porthole) */
          linear-gradient(to left,  rgba(0,0,0,.40) 0%, rgba(0,0,0,0) 22%),
          /* Top */
          linear-gradient(to bottom,rgba(0,0,0,.55) 0%, rgba(0,0,0,.18) 8%, rgba(0,0,0,0) 18%),
          /* Bottom */
          linear-gradient(to top,   rgba(0,0,0,.82) 0%, rgba(0,0,0,.30) 14%, rgba(0,0,0,0) 28%);
      }

<!-- ══════════════════════════════════════════════════════════════
     ENGINE
     Conditionally runs:
     · Mobile path: 10 lines of JS, then stops forever
     · Desktop path: full canvas engine
════════════════════════════════════════════════════════════════ -->
<script>
"use strict";

/* ═══════════════════════════════════════════════════════════════════
   BREAKPOINT DETECTION
   Must match CSS media query breakpoint (1099px / 1100px).
═══════════════════════════════════════════════════════════════════ */
let IS_MOBILE = window.innerWidth < 1100;

/* ═══════════════════════════════════════════════════════════════════
   MOBILE PATH — pure CSS reveal, zero canvas, zero RAF
   ─────────────────────────────────────────────────────────────────
   Total JS executed on mobile after page load:
   · This if-block: ~12 lines
   · After reveal: nothing. No RAF. No event listeners on background.
   · Touch events hit the content layer only, not the background.
═══════════════════════════════════════════════════════════════════ */
if (IS_MOBILE) {

  const loader   = document.getElementById('loader');
  const portrait = document.getElementById('m-portrait');
  const img      = document.getElementById('m-img');   /* <img> inside <picture> */

  /*
   * Reveal sequence:
   * 1. Add .ready → enables CSS transition (no visual change yet)
   * 2. Wait 2 frames → browser processes the transition property
   * 3. Add .in → triggers opacity/transform transition
   * 4. Portrait rises into view over 1.5s
   */
  function reveal() {
    portrait.classList.add('ready');

    /* Two-frame delay ensures .ready transition is applied before .in */
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        portrait.classList.add('in');
        /* Start parallax after entrance settles */
        setTimeout(startParallax, 1800);
      });
    });

    /* Dismiss preloader slightly before portrait starts rising */
    setTimeout(() => loader.classList.add('out'), 150);
  }

  /* Image already in cache → reveal immediately */
  if (img.complete && img.naturalWidth > 0) {
    setTimeout(reveal, 200);
  } else {
    /* Wait for decode */
    img.addEventListener('load', () => setTimeout(reveal, 200), { once: true });

    /* Image failed (wrong path etc.) — dismiss loader gracefully */
    img.addEventListener('error', () => {
      console.warn('[bg v13] design1.mobile.jpg or design1.tablet.jpg not found — check filenames');
      portrait.style.display = 'none';
      setTimeout(() => loader.classList.add('out'), 300);
    }, { once: true });
  }

  /* Hard timeout — loader always clears even if network stalls */
  setTimeout(() => {
    loader.classList.add('out');
    portrait.classList.add('ready', 'in');
    setTimeout(startParallax, 2000);
  }, 5000);

  /* ═══════════════════════════════════════════════════════════════
     GYROSCOPE PARALLAX — Mobile / Tablet tilt tracking
     ─────────────────────────────────────────────────────────────
     · DeviceOrientation: gamma = left/right tilt, beta = fwd/back
     · Lerp smoothing (t=0.045) → silky tracking, no jitter
     · rAF on compositor thread only — zero layout cost
     · iOS 13+: permission requested on FIRST USER TAP (required)
     · Android: starts automatically, no permission needed
     · Reduced motion: completely skipped
  ═══════════════════════════════════════════════════════════════ */
  const PX_STRENGTH = 48;
  const PY_STRENGTH = 36;
  const LERP_T = 0.045;

  let tx = 0, ty = 0;       /* target from sensor */
  let cx = 0, cy = 0;       /* current lerped position */
  let parallaxRafId = null;
  let parallaxActive = false;
  let gyroAttached   = false;
  const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function lerpVal(a, b, t) { return a + (b - a) * t; }
  function clampP(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  let frameCount = 0;
  function parallaxLoop() {
    if (!parallaxActive) return;
    frameCount++;
    if (frameCount % 2 === 0) { // Update at 30fps
      cx = lerpVal(cx, tx, LERP_T);
      cy = lerpVal(cy, ty, LERP_T);
      if (Math.abs(cx - tx) > 0.02 || Math.abs(cy - ty) > 0.02 || parallaxLoop._dirty) {
        img.style.transform = `translate(${cx.toFixed(2)}px, ${cy.toFixed(2)}px)`;
        parallaxLoop._dirty = false;
      }
    }
    parallaxRafId = requestAnimationFrame(parallaxLoop);
  }
  parallaxLoop._dirty = true;

  function onOrientation(e) {
    const gamma = clampP(e.gamma || 0, -30, 30) / 30;
    const beta  = clampP((e.beta  || 0) - 45, -30, 30) / 30;
    tx = gamma * PX_STRENGTH;
    ty = beta  * PY_STRENGTH;
    parallaxLoop._dirty = true;
  }

  function attachGyro() {
    if (gyroAttached) return;
    gyroAttached = true;
    /*
     * IMPORTANT: DeviceOrientationEvent permission is requested in the
     * PARENT frame (BackgroundSystem.tsx) because iOS 13+ blocks
     * requestPermission() from inside iframes. The parent forwards raw
     * gamma/beta via postMessage('ORIENTATION'), which we receive here.
     * This listener handles both iOS (after permission granted) and Android.
     */
    window.addEventListener('message', function onOriMsg(e) {
      if (!e.data || e.data.type !== 'ORIENTATION') return;
      const gamma = clampP(e.data.gamma || 0, -30, 30) / 30;
      const beta  = clampP((e.data.beta  || 0) - 45, -30, 30) / 30;
      tx = gamma * PX_STRENGTH;
      ty = beta  * PY_STRENGTH;
      parallaxLoop._dirty = true;
    });
  }

  function startParallax() {
    if (reducedMotion) return;
    parallaxActive = true;
    /* attachGyro() wires the ORIENTATION postMessage listener.
       No direct DeviceOrientationEvent here — parent frame handles permission. */
    attachGyro();
    if (!parallaxRafId) parallaxLoop();
  }

  /* Pause when tab hidden — saves battery */
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      parallaxActive = false;
      if (parallaxRafId) { cancelAnimationFrame(parallaxRafId); parallaxRafId = null; }
    } else {
      parallaxActive = true;
      if (!parallaxRafId) parallaxLoop();
    }
  });

  /* STOP HERE — no canvas initialization, no RAF, no event listeners beyond above */

} else {

/* ═══════════════════════════════════════════════════════════════════
   DESKTOP PATH — full canvas engine
   ─────────────────────────────────────────────────────────────────
   The canvas engine from v7/v8/v9 — proven, cinematic, high-quality.

   SINGLE CHANGE FROM v9:
   INK color updated to [0,0,0] — matches pure-black corners of new images.
   actual corner pixel color and the CSS base color.
═══════════════════════════════════════════════════════════════════ */

/* ── Device tier (adaptive performance budget) ── */
function computeTier() {
  const w = window.innerWidth, h = window.innerHeight;
  const ar = w / h, isPort = ar < 0.9;
  const is4K = w >= 2400, isDesk = w >= 1100 && w < 2400;
  const isTab = w >= 600 && w < 1100, isMob = w < 600;
  const dpr = window.devicePixelRatio || 1;
  const rm  = window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  const coarse = window.matchMedia('(pointer:coarse)').matches;

  return {
    is4K, isDesk, isTab, isMob, isPort, coarse, reducedMotion: rm,
    DPR: rm ? 1 : is4K ? Math.min(dpr,2.5) : isDesk ? Math.min(dpr,2.0) : isTab ? Math.min(dpr,1.5) : 1.0,
    CRYSTAL_N: rm ? 0 : is4K ? 34 : isDesk ? 28 : isTab ? 16 : 8,
    WASH_PASS : is4K || isDesk ? 4 : 3,
    FBM_OCT   : is4K || isDesk ? 5 : 4,
    WASH_PTS  : is4K || isDesk ? 56 : 44,
    GRAIN_A   : is4K || isDesk ? 3 : 4,
    GRAIN_B   : is4K || isDesk ? 7 : 9,
    PX: is4K ? .505 : isDesk ? .500 : isTab && !isPort ? .505 : isTab ? .500 : .500,
    PY: isTab && isPort ? .460 : .480,   /* slightly lower — face clear of top content */
    PSCL: is4K ? .985 : isDesk ? .975 : isTab && !isPort ? .940 : .920,
    CONTENT_ZONE: isTab ? .60 : .58,   /* wide enough to fully cover porthole ring edge */
    PAR_STR : coarse ? .006 : is4K ? .016 : .014,
    PAR_LERP: coarse ? .024 : .018,
  };
}

let T = computeTier();

/* ── Palette — INK updated to match JPEG corner pixels ── */
const C = {
  SRC   : 'design1.desktop.webp',
  INK   : [  0,   0,   0],   /* UPDATED: matches #000000, JPEG edges */
  AMBER : [192, 146,  24],
  COPPER: [148,  80,  26],
  SHADOW: [ 12,   8,  16],
  EMBER : [208,  80,  26],
};

/* ── Engine state ── */
const cv  = document.getElementById('cv');
const ctx = cv.getContext('2d', { alpha: false });

let W = 0, H = 0, tm = 0, lastTs = null, frame = 0;
let isPaused = false, rafId = null;
const mouse = { rx: .5, ry: .5 }, par = { x: 0, y: 0 };
let washes = [], crystals = [], ripples = [];
let portrait = null, portraitBmp = null, portraitOk = false;
const grainA = [], grainB = [];
let noiseMap = new Map(), noiseTick = -1;
let washJitter = null;

/* ── Utility ── */
const rgba  = (c, a) => `rgba(${c[0]},${c[1]},${c[2]},${a.toFixed(5)})`;
const lerp  = (a, b, t) => a + (b - a) * t;
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
function mkTile() {
  const c = document.createElement('canvas');
  c.width = c.height = 256;
  return { c, x: c.getContext('2d') };
}
function gauss() {
  const u = 1 - Math.random(), v = Math.random();
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}

/* ── fBm — cached per ⅓-second slice ── */
function _sn(x, y, z) {
  return (
    Math.sin(x*1.237+z+Math.sin(y*0.863+z*0.341)) *
    Math.cos(y*1.113-z*0.617+Math.cos(x*0.722+z*0.283)) * 0.71 +
    Math.sin(x*2.311+y*1.618+z*1.141) * 0.29
  );
}
function fbm(x, y, z) {
  const k = `${x.toFixed(3)},${y.toFixed(3)},${z.toFixed(3)}`;
  if (noiseMap.has(k)) return noiseMap.get(k);
  let v=0,a=.5,f=1,mx=0;
  for (let i=0; i<T.FBM_OCT; i++) { v+=a*_sn(x*f,y*f,z*f); mx+=a; a*=.52; f*=2.07; }
  const r=v/mx; noiseMap.set(k,r); return r;
}
function tickNoise() {
  const s=Math.floor(tm*3)|0;
  if(s!==noiseTick){noiseMap.clear();noiseTick=s;}
}

/* ── Polyrhythmic breathing (7 incommensurable frequencies) ── */
const φ=1.6180339887, δ=2.4142135623, ψ=1.3247179572;
function breathe(base, off=0) {
  const f=base+off*.0031;
  return(
    Math.sin(tm*f)*.44 + Math.sin(tm*f*φ)*.24 + Math.sin(tm*f*δ)*.14 +
    Math.sin(tm*f*ψ+1.14)*.10 + Math.sin(tm*f*1.7320508)*.05 +
    Math.sin(tm*f*2.2360679)*.02 + Math.sin(tm*f*3.1415926)*.01
  )*.5;
}
function flicker() {
  return(
    Math.sin(tm*.2293)*.28+Math.sin(tm*.3717)*.22+Math.sin(tm*.6131)*.18+
    Math.sin(tm*1.0007)*.14+Math.sin(tm*1.6181)*.10+
    Math.sin(tm*2.7183)*.05+Math.sin(tm*.1429)*.03
  );
}

/* ── Portrait world position ── */
function pCenter() {
  return {
    cx: W*T.PX + par.x*W*T.PAR_STR*26,
    cy: H*T.PY + par.y*H*T.PAR_STR*16,
  };
}

/* ── Atmosphere ── */
function drawAtmosphere() {
  ctx.fillStyle=rgba(C.INK,1);
  ctx.fillRect(0,0,W,H);

  const cz=ctx.createLinearGradient(0,0,W*T.CONTENT_ZONE,0);
  cz.addColorStop(0,   rgba(C.INK,.97));
  cz.addColorStop(.35, rgba(C.INK,.88));
  cz.addColorStop(.60, rgba(C.INK,.62));
  cz.addColorStop(.82, rgba(C.INK,.22));
  cz.addColorStop(1,   rgba(C.INK,0));
  ctx.fillStyle=cz; ctx.fillRect(0,0,W*T.CONTENT_ZONE,H);

  const sg=ctx.createRadialGradient(W*.05,H*.88,0,W*.05,H*.88,W*.42);
  sg.addColorStop(0,rgba(C.SHADOW,.034)); sg.addColorStop(1,rgba(C.INK,0));
  ctx.fillStyle=sg; ctx.fillRect(0,0,W,H);
}

/* ── Lighting — always drawn, portrait-independent ──
   ROOT-CAUSE FIX: warm lamp pool + ember undertow were inside
   drawPortraitSystem() behind the !portraitOk guard — so when the
   image had not yet loaded (or failed), the canvas stayed solid black.
   Moving them here means the canvas always shows cinematic atmosphere. ── */
function drawLighting() {
  const {cx,cy}=pCenter();
  const fk=flicker();
  const sa=clamp(.052+fk*.006+(breathe(.031)+.5)*.012,.030,.068);
  const lightY=cy-H*.12;
  const lg=ctx.createRadialGradient(cx,lightY,0,cx,lightY,W*.55);
  lg.addColorStop(0,   rgba(C.AMBER, sa*1.32));
  lg.addColorStop(.30, rgba(C.AMBER, sa*.70));
  lg.addColorStop(.60, rgba(C.COPPER,sa*.24));
  lg.addColorStop(1,   rgba(C.INK,0));
  ctx.fillStyle=lg; ctx.fillRect(0,0,W,H);

  const ea=.016+Math.sin(tm*.2837)*.003;
  const eg=ctx.createRadialGradient(cx*.82,cy+H*.28,0,cx*.82,cy+H*.28,W*.34);
  eg.addColorStop(0,rgba(C.EMBER,ea));
  eg.addColorStop(.58,rgba(C.EMBER,ea*.18));
  eg.addColorStop(1,rgba(C.INK,0));
  ctx.fillStyle=eg; ctx.fillRect(0,0,W,H);
}

/* ── Portrait system (desktop) ── */
function drawPortraitSystem() {
  if(!portraitOk) return;
  const src=portraitBmp||portrait; if(!src) return;
  const {cx,cy}=pCenter();
  /* Guard: naturalHeight=0 means decode still pending — skip this frame */
  if(!portrait.naturalHeight) return;
  const ar=portrait.naturalWidth/portrait.naturalHeight;
  const ph=H*T.PSCL, pw=ph*ar, px=cx-pw*.50, py=cy-ph*.40;

  /* Dark backing — tighter radius for new images that already have dark corners */
  const bkR=Math.max(pw,ph)*.52;
  const bk=ctx.createRadialGradient(cx,cy,0,cx,cy,bkR);
  bk.addColorStop(0,   rgba(C.INK,.55));  /* lighter centre — porthole warmth shows */
  bk.addColorStop(.35, rgba(C.INK,.68));
  bk.addColorStop(.65, rgba(C.INK,.40));
  bk.addColorStop(1,   rgba(C.INK,0));
  ctx.fillStyle=bk; ctx.fillRect(0,0,W,H);

  /* Portrait image */
  const br=T.reducedMotion?.82:clamp(.74+(breathe(.042,1)+.5)*.18,.70,.92);
  ctx.save(); ctx.globalAlpha=br; ctx.drawImage(src,px,py,pw,ph); ctx.restore();

  /* Shadow split-tone */
  ctx.save(); ctx.globalAlpha=br*.80;
  const sh=ctx.createRadialGradient(cx,cy,pw*.05,cx,cy,pw*.58);
  sh.addColorStop(0,rgba(C.SHADOW,0)); sh.addColorStop(.44,rgba(C.SHADOW,.05));
  sh.addColorStop(.76,rgba(C.SHADOW,.14)); sh.addColorStop(1,rgba(C.SHADOW,.30));
  ctx.fillStyle=sh; ctx.fillRect(px-8,py-8,pw+16,ph+16); ctx.restore();

  /* Amber highlight */
  ctx.save(); ctx.globalAlpha=br*.86;
  const ht=ctx.createRadialGradient(cx,cy-ph*.16,0,cx,cy-ph*.16,pw*.40);
  ht.addColorStop(0,rgba(C.AMBER,.09)); ht.addColorStop(.5,rgba(C.AMBER,.04)); ht.addColorStop(1,rgba(C.AMBER,0));
  ctx.fillStyle=ht; ctx.fillRect(px,py,pw,ph); ctx.restore();

  /* Dodge eye zone */
  ctx.save(); ctx.globalCompositeOperation='screen'; ctx.globalAlpha=br*.30;
  const dg=ctx.createRadialGradient(cx-pw*.05,cy-ph*.09,0,cx-pw*.05,cy-ph*.09,pw*.18);
  dg.addColorStop(0,rgba(C.AMBER,.020)); dg.addColorStop(1,rgba(C.AMBER,0));
  ctx.fillStyle=dg; ctx.fillRect(px,py,pw,ph); ctx.restore();

  /* Edge dissolve burns — symmetric for centred desktop image */
  [
    /* Left — strong, covers porthole ring fully in content zone */
    {x0:px,         x1:px+pw*.46,y0:0,y1:0,s:[[0,.98],[.28,.94],[.55,.70],[.78,.22],[1,0]],  rx:px-4,       ry:py-20,      rw:pw*.46+6,rh:ph+40},
    /* Right — symmetric natural falloff */
    {x0:px+pw*.58,  x1:px+pw,    y0:0,y1:0,s:[[0,0],[.35,.32],[.72,.82],[.90,.95],[1,.98]],  rx:px+pw*.58,  ry:py-20,      rw:pw*.42+6,rh:ph+40},
    /* Top — gentle, lamp at top of image should show its warm glow */
    {x0:0,x1:0,     y0:py,       y1:py+ph*.22,s:[[0,.95],[.40,.55],[.75,.08],[1,0]], rx:px-20,      ry:py-4,       rw:pw+40,   rh:ph*.22+6},
    /* Bottom */
    {x0:0,x1:0,     y0:py+ph*.66,y1:py+ph,    s:[[0,0],[.48,.50],[.84,.88],[1,1]], rx:px-20,      ry:py+ph*.66,  rw:pw+40,   rh:ph*.34+6},
  ].forEach(b=>{
    const g=ctx.createLinearGradient(b.x0,b.y0,b.x1,b.y1);
    b.s.forEach(([s,a])=>g.addColorStop(s,rgba(C.INK,a)));
    ctx.fillStyle=g; ctx.fillRect(b.rx,b.ry,b.rw,b.rh);
  });
}

/* ── Washes ── */
const WASH_DEFS=[
  /* Amber wash — centred, matches new centred portrait */
  {cx:.50,cy:.36,rx:.52,ry:.48,col:C.AMBER, baseA:.022,nf:.54,na:.20,ph:0.00,spd:.000038},
  /* Shadow wash — bottom-left depth anchor (unchanged) */
  {cx:.14,cy:.72,rx:.40,ry:.28,col:C.SHADOW,baseA:.018,nf:.66,na:.18,ph:4.19,spd:.000032},
];
function buildWashes(){
  const ex=washJitter!==null;
  washes=WASH_DEFS.map((d,wi)=>{
    const jit=ex
      ?washJitter[wi].map(j=>({
          dx:j.dx*.96+(Math.random()-.5)*.004,dy:j.dy*.96+(Math.random()-.5)*.004,
          ds:clamp(j.ds*.99+Math.random()*.018,.82,1.14),da:clamp(j.da*.99+Math.random()*.018,.38,1.02)}))
      :Array.from({length:T.WASH_PASS},()=>({
          dx:(Math.random()-.5)*.030,dy:(Math.random()-.5)*.030,
          ds:.86+Math.random()*.28,da:.42+Math.random()*.58}));
    return{...d,jit};
  });
  washJitter=washes.map(w=>w.jit);
}
function drawWash(w){
  const{cx:pcx,cy:pcy}=pCenter();
  const followX=w===washes[0]?pcx:w.cx*W+par.x*W*T.PAR_STR*8;
  const followY=w===washes[0]?pcy:w.cy*H+par.y*H*T.PAR_STR*8;
  const brx=Math.min(W,H)*w.rx,bry=Math.min(W,H)*w.ry,z=tm*w.spd*1000;
  for(let p=0;p<T.WASH_PASS;p++){
    const j=w.jit[p]||w.jit[0];
    const ox=followX+j.dx*W,oy=followY+j.dy*H,rx=brx*j.ds,ry=bry*j.ds,a=w.baseA*j.da/T.WASH_PASS;
    ctx.beginPath();
    for(let i=0;i<=T.WASH_PTS;i++){
      const ang=(i/T.WASH_PTS)*Math.PI*2;
      const n=fbm(Math.cos(ang)*w.nf+w.ph+p*.11,Math.sin(ang)*w.nf+w.ph+p*.11,z+p*.06);
      const ex=ox+Math.cos(ang)*rx*(1+n*w.na),ey=oy+Math.sin(ang)*ry*(1+n*w.na);
      i===0?ctx.moveTo(ex,ey):ctx.lineTo(ex,ey);
    }
    ctx.closePath();
    const gr=ctx.createRadialGradient(ox,oy,0,ox,oy,Math.max(rx,ry)*1.10);
    gr.addColorStop(0,rgba(w.col,a*.48));gr.addColorStop(.48,rgba(w.col,a*.84));
    gr.addColorStop(.84,rgba(w.col,a*1.10));gr.addColorStop(1,rgba(w.col,0));
    ctx.fillStyle=gr;ctx.fill();
  }
}

/* ── Crystals ── */
const GRID_SZ=100; let flockGrid=new Map();
function mkCrystal(anywhere){
  const{cx:pcx,cy:pcy}=pCenter();
  const baseX=anywhere?Math.random()*W:clamp(pcx+gauss()*W*.22,W*.10,W*.95);
  const baseY=anywhere?Math.random()*H:clamp(pcy+gauss()*H*.28,H*.06,H*.94);
  const rng=Math.random();
  const r=rng<.78?.18+Math.random()*.60:rng<.95?.82+Math.random()*1.00:2.0+Math.random()*1.50;
  return{
    x:baseX,y:baseY,vx:(Math.random()-.5)*.030,vy:(Math.random()-.5)*.016-.007,r,
    maxA:r<1.0?.016+Math.random()*.044:r<1.8?.032+Math.random()*.064:.022+Math.random()*.042,
    life:0,maxL:300+Math.random()*700,
    swF:.0005+Math.random()*.001,swA:.006+Math.random()*.014,swP:Math.random()*Math.PI*2,
    flR:14+Math.random()*44,flF:.00004+Math.random()*.00008,
  };
}
function buildFlockGrid(){
  flockGrid.clear();
  for(const c of crystals){
    const k=`${Math.floor(c.x/GRID_SZ)},${Math.floor(c.y/GRID_SZ)}`;
    if(!flockGrid.has(k))flockGrid.set(k,[]);
    flockGrid.get(k).push(c);
  }
}
function getNeighbours(c){
  const gx=Math.floor(c.x/GRID_SZ),gy=Math.floor(c.y/GRID_SZ),r=[];
  for(let dx=-1;dx<=1;dx++)for(let dy=-1;dy<=1;dy++){const ns=flockGrid.get(`${gx+dx},${gy+dy}`);if(ns)for(const n of ns)r.push(n);}
  return r;
}
function initCrystals(){crystals=Array.from({length:T.CRYSTAL_N},()=>mkCrystal(true));}
function drawCrystals(){
  if(T.reducedMotion||!T.CRYSTAL_N)return;
  buildFlockGrid();
  const doPhys=!T.coarse||frame%2===0;
  const fk=.78+flicker()*.22;
  ctx.save();
  crystals=crystals.filter(c=>{
    c.life++;if(c.life>=c.maxL)return false;
    if(doPhys){
      for(const nb of getNeighbours(c)){
        if(nb===c)continue;
        const dx=nb.x-c.x,dy=nb.y-c.y,d=Math.hypot(dx,dy);
        if(d<c.flR&&d>.5){const f=c.flF*(1-d/c.flR);c.vx+=dx/d*f;c.vy+=dy/d*f;}
      }
      c.vx*=.994;c.vy*=.994;
      c.x+=c.vx+Math.sin(tm*c.swF*1000+c.swP)*c.swA;c.y+=c.vy;
    }
    if(c.x<-20||c.x>W+20||c.y<-20||c.y>H+20)return false;
    const lt=c.life/c.maxL;
    const env=lt<.12?Math.sin((lt/.12)*Math.PI*.5):Math.sin((1-(lt-.12)/.88)*Math.PI*.5)*.88+.12;
    const a=c.maxA*env;
    const gR=c.r*(c.r>1.8?5.5:8.0);
    const g=ctx.createRadialGradient(c.x,c.y,0,c.x,c.y,gR);
    g.addColorStop(0,rgba(C.AMBER,a*.38*fk));g.addColorStop(.5,rgba(C.AMBER,a*.12*fk));g.addColorStop(1,rgba(C.AMBER,0));
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(c.x,c.y,gR,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=rgba(C.AMBER,clamp(a*fk*1.50,0,1));ctx.beginPath();ctx.arc(c.x,c.y,c.r,0,Math.PI*2);ctx.fill();
    return true;
  });
  ctx.restore();
  while(crystals.length<T.CRYSTAL_N)crystals.push(mkCrystal(false));
}

/* ── Ripples ── */
function addRipple(x,y){
  for(let i=0;i<4;i++)ripples.push({x,y,r:0,a:.44,delay:i*58+Math.floor(Math.random()*28),spd:1.6+Math.random()*2.0,maxR:40+Math.random()*90,sx:.82+Math.random()*.35,sy:.82+Math.random()*.35,rot:Math.random()*Math.PI});
}
function drawRipples(){
  ripples=ripples.filter(r=>{
    if(r.delay>0){r.delay--;return true;}
    r.r+=r.spd;r.a*=.936;if(r.r>r.maxR||r.a<.005)return false;
    ctx.save();ctx.translate(r.x,r.y);ctx.rotate(r.rot);ctx.scale(r.sx,r.sy);
    ctx.beginPath();ctx.arc(0,0,r.r,0,Math.PI*2);
    ctx.strokeStyle=rgba(C.AMBER,r.a);ctx.lineWidth=.55;ctx.stroke();
    ctx.restore();return true;
  });
}

/* ── Warm film grain — PRE-CALCULATED for mobile performance ── */
function initGrain(){
  for(let n=0;n<6;n++){
    const a=mkTile(),b=mkTile();
    const da=a.x.createImageData(256,256), db=b.x.createImageData(256,256);
    for(let i=0;i<da.data.length;i+=4){
      const vA=clamp(Math.round(128+gauss()*40),0,255);
      da.data[i]=clamp(vA+18,0,255);da.data[i+1]=clamp(vA-1,0,255);da.data[i+2]=clamp(vA-34,0,255);da.data[i+3]=6;
      const row=Math.floor(i/4/256);
      const vB=clamp(Math.round(110+gauss()*30+(row%4)*5),0,255);
      db.data[i]=clamp(vB+9,0,255);db.data[i+1]=clamp(vB+1,0,255);db.data[i+2]=clamp(vB-22,0,255);db.data[i+3]=3;
    }
    a.x.putImageData(da,0,0); b.x.putImageData(db,0,0);
    grainA.push(a.c); grainB.push(b.c);
  }
}
function drawGrain(){
  const tA=grainA[frame%6], tB=grainB[(frame+3)%6];
  ctx.save();ctx.globalCompositeOperation='screen';
  if(T.isMob){
    ctx.globalAlpha=.04;
    for(let y=0;y<H;y+=256)for(let x=0;x<W;x+=256)ctx.drawImage(tA,x,y,Math.min(256,W-x),Math.min(256,H-y));
  }else{
    ctx.globalAlpha=.052;
    for(let y=0;y<H;y+=256)for(let x=0;x<W;x+=256)ctx.drawImage(tA,x,y,Math.min(256,W-x),Math.min(256,H-y));
    ctx.globalAlpha=.022;
    for(let y=0;y<H;y+=256)for(let x=0;x<W;x+=256)ctx.drawImage(tB,x,y,Math.min(256,W-x),Math.min(256,H-y));
  }
  ctx.restore();
}

/* ── Main loop ── */
function draw(ts){
  if(isPaused)return;
  if(!lastTs)lastTs=ts;
  const dt=Math.min((ts-lastTs)/1000,.05);
  lastTs=ts;tm+=dt;frame++;
  tickNoise();
  par.x=lerp(par.x,mouse.rx-.5,T.PAR_LERP);
  par.y=lerp(par.y,mouse.ry-.5,T.PAR_LERP);
  drawAtmosphere();
  drawLighting();
  washes.forEach(drawWash);
  drawPortraitSystem();
  drawCrystals();
  drawRipples();
  drawGrain();
  rafId=requestAnimationFrame(draw);
}

/* ── Throttle ── */
function throttle(fn,ms){let last=0;return function(){const now=performance.now();if(now-last<ms)return;last=now;fn.apply(this,arguments);};}

/* ── Events ── */
window.addEventListener('mousemove',throttle(e=>{mouse.rx=clamp(e.clientX/(W||1),0,1);mouse.ry=clamp(e.clientY/(H||1),0,1);},16),{passive:true});
window.addEventListener('click',e=>addRipple(e.clientX,e.clientY));
window.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' ')addRipple(W/2,H/2);});
let rTO;
window.addEventListener('resize',()=>{clearTimeout(rTO);rTO=setTimeout(()=>{const nw=window.innerWidth,nh=window.innerHeight;if(Math.abs(nw-W)>5||Math.abs(nh-H)>5)setup();},120);},{passive:true});
document.addEventListener('visibilitychange',()=>{if(document.hidden){isPaused=true;if(rafId){cancelAnimationFrame(rafId);rafId=null;}}else if(isPaused){isPaused=false;lastTs=null;rafId=requestAnimationFrame(draw);}});
window.addEventListener('message',e=>{
  if(e.origin !== window.location.origin) return;
  if(e.data==='PAUSE'){
    isPaused=true;
    if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  }else if(e.data==='PLAY'&&isPaused){
    isPaused=false;
    lastTs=null;
    rafId=requestAnimationFrame(draw);
  }else if(e.data && e.data.type==='CLICK'){
    addRipple(e.data.x, e.data.y);
  }else if(e.data && e.data.type==='MOUSEMOVE'){
    /* Parent forwards mouse position — smooth the canvas portrait parallax */
    mouse.rx = clamp(e.data.rx, 0, 1);
    mouse.ry = clamp(e.data.ry, 0, 1);
  }
});

/* ── Setup ── */
function setup(){
  W=window.innerWidth; H=window.innerHeight;
  T=computeTier();
  cv.width=Math.round(W*T.DPR); cv.height=Math.round(H*T.DPR);
  ctx.setTransform(T.DPR,0,0,T.DPR,0,0);
  buildWashes(); initCrystals(); initGrain(); noiseMap.clear();
}

/* ── Desktop boot ── */
(function desktopBoot(){
  setup();
  rafId=requestAnimationFrame(draw);
  const img=new Image();
  const loader=document.getElementById('loader');
  img.onload=async()=>{
    portrait=img; portraitOk=true;
    if(typeof createImageBitmap!=='undefined'){try{portraitBmp=await createImageBitmap(img);}catch(_){}}
    setTimeout(()=>loader.classList.add('out'),600);
  };
  img.onerror=()=>{
    portraitOk=false;
    console.warn('[bg v13] design1.desktop.jpg not found — check filename');
    setTimeout(()=>loader.classList.add('out'),300);
  };
  img.src=C.SRC;
  /* FIX: browser may have already decoded from cache before onload fires */
  if(img.complete && img.naturalWidth > 0 && !portraitOk){
    portrait=img; portraitOk=true;
    if(typeof createImageBitmap!=='undefined'){
      try{createImageBitmap(img).then(b=>{portraitBmp=b;});}catch(_){}
    }
    setTimeout(()=>loader.classList.add('out'),300);
  }
  setTimeout(()=>loader.classList.add('out'),6000);
})();

} /* end desktop else block */
</script>
